services:
  lumenroute:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: lumenroute
    restart: unless-stopped
    ports:
      - "${LUMENROUTE_SERVER_PORT:-8080}:8080"
    volumes:
      - lumenroute-data:/app/data
    env_file:
      - .env
    environment:
      - LUMENROUTE_SERVER_HOST=0.0.0.0
      - LUMENROUTE_SERVER_PORT=8080
      - LUMENROUTE_DB_DSN=file:/app/data/lumenroute.db?_foreign_keys=on&_journal_mode=WAL
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/v1/models"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  lumenroute-data:
    driver: local
