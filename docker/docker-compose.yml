services:
  lumenroute:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: lumenroute
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data:/app/data
    environment:
      - LUMENROUTE_SERVER_HOST=0.0.0.0
      - LUMENROUTE_SERVER_PORT=8080
      - LUMENROUTE_DB_DRIVER=sqlite
      - LUMENROUTE_DB_DSN=/app/data/lumenroute.db
      - LUMENROUTE_PROXY_AUTH_MODE=required
      - LUMENROUTE_SESSION_SECRET=
      - LUMENROUTE_HEALTH_CHECK_INTERVAL_SECONDS=30
      - LUMENROUTE_REQUEST_LOG_RETENTION_DAYS=7
      - LUMENROUTE_METRICS_ENABLED=true
      - LUMENROUTE_METRICS_PATH=/metrics
